name: eBay Campaign Scheduler

# Times are UTC. Pacific offsets:
#   PDT (Mar–Nov): UTC-7  → these times are exact
#   PST (Nov–Mar): UTC-8  → these run 1 hour late; update offsets seasonally if needed
#
# Pause schedule:  Mon–Fri at 12:30am PT → 07:30 UTC Mon–Fri
# Resume schedule: Mon–Fri at 1:00pm PT  → 20:00 UTC Mon–Fri
# Weekend:         campaign runs Sat–Sun uninterrupted (no Sat/Sun cron)

on:
  schedule:
    # Pause:  Mon–Fri at 07:30 UTC (12:30am PT)
    - cron: "30 7 * * 1-5"
    # Resume: Mon–Fri at 20:00 UTC (1:00pm PT)
    - cron: "0 20 * * 1-5"
  workflow_dispatch:
    inputs:
      action:
        description: "Manual override: pause or resume"
        required: true
        default: "resume"
        type: choice
        options:
          - pause
          - resume

jobs:
  pause:
    if: github.event_name == 'schedule' && github.event.schedule == '30 7 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Get timestamp
        id: ts
        if: always()
        run: echo "value=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Pause campaign
        id: campaign
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          EBAY_CAMPAIGN_ID: ${{ secrets.EBAY_CAMPAIGN_ID }}
        run: python3 campaign_control.py pause

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: eBay Campaign Scheduler
          subject: "[${{ steps.campaign.outcome == 'success' && 'SUCCESS' || 'FAILURE' }}] Campaign paused — ${{ steps.ts.outputs.value }}"
          body: |
            eBay campaign pause job completed.

            Result: ${{ steps.campaign.outcome }}
            Time: ${{ github.run_started_at }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  resume:
    if: github.event_name == 'schedule' && github.event.schedule == '0 20 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Get timestamp
        id: ts
        if: always()
        run: echo "value=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Resume campaign
        id: campaign
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          EBAY_CAMPAIGN_ID: ${{ secrets.EBAY_CAMPAIGN_ID }}
        run: python3 campaign_control.py resume

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: eBay Campaign Scheduler
          subject: "[${{ steps.campaign.outcome == 'success' && 'SUCCESS' || 'FAILURE' }}] Campaign resumed — ${{ steps.ts.outputs.value }}"
          body: |
            eBay campaign resume job completed.

            Result: ${{ steps.campaign.outcome }}
            Time: ${{ github.run_started_at }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  run-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Get timestamp
        id: ts
        if: always()
        run: echo "value=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Run campaign control (manual)
        id: campaign
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
          EBAY_CAMPAIGN_ID: ${{ secrets.EBAY_CAMPAIGN_ID }}
        run: python3 campaign_control.py ${{ github.event.inputs.action }}

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: eBay Campaign Scheduler
          subject: "[${{ steps.campaign.outcome == 'success' && 'SUCCESS' || 'FAILURE' }}] Manual ${{ github.event.inputs.action }} — ${{ steps.ts.outputs.value }}"
          body: |
            eBay campaign manual override completed.

            Action: ${{ github.event.inputs.action }}
            Result: ${{ steps.campaign.outcome }}
            Time: ${{ github.run_started_at }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
